<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Smart E-Commerce Analytics{% endblock %}</title>
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
    :root {
        --navy: #0b1320;
        --panel: #ffffff;
        --bg: #f4f6fa;
        --border: #e3e7ee;
        --text-dark: #0f1b2d;
        --text-muted: #64748b;
        --blue: #2563eb;
        --green: #0d9488;
        --amber: #d97706;
        --purple: #7c3aed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
    body { background: var(--bg); color: var(--text-dark); }

    .topbar { background: var(--navy); color: white; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 68px; }
    .topbar-left { display: flex; align-items: center; gap: 32px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo-badge { width: 34px; height: 34px; border-radius: 8px; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .brand-text h1 { font-size: 15px; font-weight: 600; line-height: 1.2; }
    .brand-text p { color: #9aa7bd; font-size: 11px; }

    .nav-links { display: flex; gap: 4px; }
    .nav-link { color: #9aa7bd; text-decoration: none; font-size: 13.5px; font-weight: 500; padding: 9px 16px; border-radius: 8px; display: flex; align-items: center; gap: 7px; }
    .nav-link:hover { background: #142235; color: white; }
    .nav-link.active { background: var(--blue); color: white; }

    .status-pill { display: flex; align-items: center; gap: 7px; background: #142235; border: 1px solid #243a56; padding: 7px 14px; border-radius: 20px; font-size: 12px; color: #9aa7bd; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }

    .container { max-width: 1180px; margin: 32px auto; padding: 0 24px; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; }
    .panel-head h3 { font-size: 15px; font-weight: 600; color: var(--text-dark); }
    .panel-head .sub { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
    .footer-note { text-align: center; color: var(--text-muted); font-size: 11.5px; margin-top: 24px; padding-bottom: 30px; }
</style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <div class="brand">
            <div class="logo-badge"><i class="ti ti-chart-histogram"></i></div>
            <div class="brand-text">
                <h1>Smart E-Commerce Analytics</h1>
                <p>DSA05 Query Processing for Data Science</p>
            </div>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link {% if active=='home' %}active{% endif %}"><i class="ti ti-layout-dashboard"></i> Home</a>
            <a href="/queries" class="nav-link {% if active=='queries' %}active{% endif %}"><i class="ti ti-database"></i> SQL insights</a>
            <a href="/predict" class="nav-link {% if active=='predict' %}active{% endif %}"><i class="ti ti-brain"></i> Predict revenue</a>
        </div>
    </div>
    <div class="status-pill"><span class="status-dot"></span> PostgreSQL connected</div>
</div>

<div class="container">
{% block content %}{% endblock %}
</div>

{% block scripts %}{% endblock %}

</body>
</html>
